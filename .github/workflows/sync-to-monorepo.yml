name: Sync to COREX-Framework monorepo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Debug secret
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          if [ -z "$SYNC_PAT" ]; then echo "EMPTY"; else echo "LEN=${#SYNC_PAT}"; fi
          echo "first 4 chars (safe): ${SYNC_PAT:0:4}"
